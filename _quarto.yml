project:
  type: website
  resources:
    - files/
    - talks/
    - images/
    - listing-grid/banners/    # CHANGE: rename to match your folder name (e.g. projects/banners/)
    - listing-default/banners/ # CHANGE: rename to match your folder name (e.g. blog/banners/)

website:
  title: Your Name                          # CHANGE: your full name
  image: images/card.png
  favicon: images/favicon.png
  description: Your Name - brief description of who you are and what you do.
  site-url: https://yourdomain.com          # CHANGE: your site URL
  repo-url: https://github.com/yourgithub/your-repo  # CHANGE
  back-to-top-navigation: false
  twitter-card: true
  open-graph:
    locale: en_US
    image: images/card.png
  page-footer:
    center: "© 2025 [Your Name](https://yourdomain.com)"  # CHANGE
    border: true
    background: light
  search:
    location: navbar
    type: overlay
    copy-button: true

  navbar:
    left:
      - icon: person-badge
        href: single-page.qmd
        text: About
      - icon: file-text
        href: listing-default.qmd
        text: Blog
      - icon: file-bar-graph
        href: listing-grid.qmd
        text: Projects
      - icon: file-pdf
        href: papers.qmd
        text: Papers
      - icon: file-slides
        href: talks.qmd
        text: Talks

    right:                                  # CHANGE: update or remove social links
      - icon: linkedin
        href: https://www.linkedin.com/in/yourprofile/
        target: _blank
      - icon: github
        href: https://github.com/yourgithub
        target: _blank
      - text: "<i class='fa-brands fa-orcid'></i>"
        href: https://orcid.org/0000-0000-0000-0000
        target: _blank
      - text: "<i class='fa-brands fa-google-scholar'></i>"
        href: https://scholar.google.com/citations?user=YOURID
        target: _blank

format:
  html:
    toc: true
    toc-depth: 5
    toc-location: right
    lightbox: true
    theme:
      light: [flatly, styles/theme.scss]
      dark: [darkly, styles/theme.scss]
    embed-resources: false
    link-external-newwindow: true
    link-external-icon: false
    link-external-filter: '^(?:http:|https:)\/\/(?:www\.)?yourdomain\.com'  # CHANGE
    include-after-body:
      text: |
        <script>
        (function() {
          function init() {
            var targets = document.querySelectorAll('.quarto-post, .quarto-grid-item, .presentation-box');
            if (!targets.length || !window.IntersectionObserver) return;
            targets.forEach(function(el, i) {
              el.classList.add('animate-on-scroll');
              el.style.setProperty('--anim-delay', Math.min(i * 60, 300) + 'ms');
            });
            var obs = new IntersectionObserver(function(entries) {
              entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add('is-visible');
                  obs.unobserve(entry.target);
                }
              });
            }, { threshold: 0.08 });
            targets.forEach(function(el) { obs.observe(el); });
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
          } else {
            init();
          }
        })();
        </script>

knitr:
  opts_chunk:
    comment: "#>"
    fig.align: "center"
    fig.show: "hold"
    fig.asp: 0.618
    fig.retna: 3
    out.width: 80%

execute:
  warning: false
